<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de NF - HMS</title>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #3498db; --success: #2ecc71; 
            --danger: #e74c3c; --warning: #f1c40f; --bg: #f4f7f6; 
            --card-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; min-height: 100vh; color: #333; }
        
        /* Header & Nav */
        .hms-bar { background: var(--primary); color: white; padding: 1rem; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .sub-header { 
            background: white; padding: 1.5rem; margin-bottom: 2rem; 
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 1rem; sticky: top;
        }

        /* Cards Layout */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; padding: 0 20px 40px 20px; max-width: 1600px; margin: 0 auto;
        }

        .card { 
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: var(--card-shadow); border-top: 5px solid var(--accent);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card-header { padding: 15px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .card-header h3 { margin: 0; font-size: 1.1rem; color: var(--primary); }

        /* Steps */
        .steps-container { padding: 15px; }
        .step { 
            display: flex; align-items: center; padding: 8px 12px; margin-bottom: 8px;
            border-radius: 8px; border: 1px solid #eee; transition: 0.3s;
        }
        .step.done { background: #eafff2; border-color: var(--success); color: #155724; }
        .step.pending { background: #fff; }
        .step.disabled { opacity: 0.5; background: #f9f9f9; cursor: not-allowed; }
        .step input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; cursor: pointer; }

        /* Utils */
        .btn { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-save { background: var(--accent); color: white; width: 100%; margin-top: 8px; }
        .btn-view { background: var(--success); color: white; width: 100%; text-decoration: none; display: inline-block; text-align: center; margin-top: 10px; }
        
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px; box-sizing: border-box; resize: vertical; margin-top: 10px; }
        
        .log-box { font-size: 0.75rem; background: #f8f9fa; padding: 10px; border-radius: 6px; max-height: 80px; overflow-y: auto; margin-top: 10px; color: #666; }

        /* Screens */
        #login-screen { 
            position: fixed; inset: 0; background: var(--primary); 
            display: flex; justify-content: center; align-items: center; z-index: 1000; 
        }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }

        #loading-bar { position: fixed; top: 0; left: 0; height: 4px; background: var(--success); transition: width 0.3s; z-index: 2000; width: 0%; }
    </style>
</head>
